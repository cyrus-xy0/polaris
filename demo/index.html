<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Polaris 任务节点 Demo</title>
    <link rel="stylesheet" href="/demo/styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar" aria-label="应用导航">
        <div class="brand">
          <span class="brand-mark"></span>
          <span class="brand-name">Polaris</span>
        </div>
        <nav class="nav" aria-label="主导航">
          <button class="nav-item is-active" data-view-button="today">Focus</button>
          <button class="nav-item" data-view-button="tree">Breakdown</button>
          <button class="nav-item" data-view-button="methods">Playbook</button>
        </nav>
      </header>

      <section class="hero view is-active" id="today-view">
        <section class="current-panel work-card is-primary" aria-labelledby="current-title">
          <div class="current-node-indicator" aria-label="当前任务节点" title="当前任务节点">
            <span></span>
          </div>
          <div class="focus-header">
            <p class="panel-kicker">Current Node</p>
            <button
              class="ai-refresh-button"
              id="refresh-ai-button"
              type="button"
              aria-label="生成或重新生成当前任务 AI 结果"
              title="生成或重新生成当前任务 AI 结果"
            >
              ↻
            </button>
          </div>
          <h1 id="current-title"></h1>
          <p class="current-summary" id="current-summary"></p>

          <div class="node-chip-row">
            <span class="node-chip" id="current-priority"></span>
            <span class="node-chip muted" id="current-rank"></span>
          </div>

          <div class="current-node-intelligence" aria-label="当前节点执行上下文">
            <section class="work-card context-panel current-node-subpanel">
              <div class="panel-heading">
                <p class="panel-kicker">Why Now</p>
                <h2>执行判断</h2>
              </div>
              <div class="signal-grid" id="workflow-signals"></div>
            </section>

            <section class="work-card context-panel current-node-subpanel">
              <div class="panel-heading">
                <p class="panel-kicker">Context</p>
                <h2>上下文</h2>
              </div>
              <div class="context-list" id="context-used-list"></div>
            </section>
          </div>

          <article class="action-plan work-card-section">
            <div class="action-plan-header">
              <div>
                <p class="panel-kicker">Suggest Action Plan</p>
              </div>
            </div>
            <p class="plan-summary" id="action-plan-summary"></p>
            <ol class="plan-steps" id="action-plan-steps"></ol>
          </article>

          <article class="prepared-result work-card-section">
            <div class="prepared-result-header">
              <div>
                <p class="panel-kicker">Draft Output</p>
                <h2 id="prepared-result-title"></h2>
              </div>
            </div>
            <p id="prepared-result-summary"></p>
            <ul id="prepared-result-points"></ul>
          </article>

          <div class="completion-panel finish-dock" aria-label="当前任务完成方式">
            <a class="ai-result-link" id="ai-result-link" href="#" target="_blank" rel="noreferrer">查看 AI 结果</a>
            <input id="manual-result-url" type="url" placeholder="粘贴 Doc / Base / HTML 结果链接" />
            <button class="primary-action finish-action" id="complete-button">Complete</button>
          </div>
        </section>

        <aside class="queue-panel work-card" aria-labelledby="queue-title">
          <div class="queue-header">
            <div>
              <p class="panel-kicker">Task Queue</p>
              <h2 id="queue-title">Task Queue</h2>
            </div>
          </div>

          <div class="queue-chain" id="queue-chain"></div>
        </aside>
      </section>

      <section class="workspace-page view" id="tree-view">
        <section class="tree-canvas tree-only glass" aria-label="目标树">
          <div class="tree-map" id="tree-map"></div>
        </section>
      </section>

      <section class="node-editor-drawer" id="node-editor-drawer" hidden aria-label="节点编辑抽屉">
        <aside class="tree-editor glass" aria-labelledby="node-editor-heading">
          <div class="node-editor-shell">
            <button class="editor-close" id="node-editor-close" type="button" aria-label="关闭节点编辑器">×</button>
            <form class="node-editor-form" id="node-editor-form">
              <div class="node-editor-header">
                <p class="panel-kicker">Node Editor</p>
                <h2 id="node-editor-heading">编辑节点</h2>
                <span id="node-editor-meta"></span>
              </div>

              <label class="node-editor-field">
                <span>标题</span>
                <input id="node-editor-title" name="title" type="text" autocomplete="off" />
              </label>

              <label class="node-editor-field">
                <span>描述</span>
                <textarea id="node-editor-description" name="description"></textarea>
              </label>

              <label class="node-editor-field">
                <span>优先级</span>
                <select id="node-editor-priority" name="priority">
                  <option value="auto">AI 自动判断</option>
                  <option value="P0">P0 · 必须马上做</option>
                  <option value="P1">P1 · 尽早完成</option>
                  <option value="P2">P2 · 其他节点</option>
                </select>
              </label>

              <div class="node-editor-field node-dependency-field">
                <span id="node-editor-dependencies-label">前置依赖节点</span>
                <div class="node-dependency-add-row">
                  <input
                    id="node-editor-dependency-search"
                    type="search"
                    placeholder="搜索节点"
                    autocomplete="off"
                    list="node-editor-dependency-options"
                    aria-labelledby="node-editor-dependencies-label"
                  />
                  <button class="node-dependency-add" id="node-editor-dependency-add" type="button">添加</button>
                </div>
                <datalist id="node-editor-dependency-options"></datalist>
                <div
                  class="node-dependency-selected"
                  id="node-editor-dependency-selected"
                  role="list"
                  aria-label="当前前置依赖节点"
                  aria-live="polite"
                ></div>
              </div>

              <div class="node-editor-actions">
                <button class="primary-action" type="submit">保存节点</button>
                <button class="soft-action" id="node-editor-ai-split" type="button">AI 生成子节点</button>
              </div>
              <p class="node-editor-status" id="node-editor-status" role="status"></p>
            </form>
          </div>
        </aside>
      </section>

      <section class="workspace-page view" id="methods-view">
        <div class="knowledge-layout knowledge-workbench">
          <section class="knowledge-section current-result-section glass" data-workbench-section="output">
            <div class="canvas-header">
              <div>
                <p class="panel-kicker">Artifacts</p>
                <h2>产物索引</h2>
              </div>
              <button
                class="section-collapse-toggle"
                type="button"
                data-workbench-toggle="output"
                aria-controls="intermediate-grid"
                aria-expanded="true"
                aria-label="收起 Artifacts"
                title="收起 Artifacts"
              ></button>
            </div>
            <div class="knowledge-grid artifact-grid" id="intermediate-grid"></div>
          </section>

          <section class="knowledge-section skill-section glass" data-workbench-section="skill">
            <div class="canvas-header">
              <div>
                <p class="panel-kicker">Skill</p>
                <h2>可调用能力</h2>
              </div>
              <button
                class="section-collapse-toggle"
                type="button"
                data-workbench-toggle="skill"
                aria-controls="skill-grid"
                aria-expanded="true"
                aria-label="收起 Skill"
                title="收起 Skill"
              ></button>
            </div>
            <div class="knowledge-grid" id="skill-grid"></div>
          </section>

          <section class="knowledge-section reusable-knowledge-section glass" data-workbench-section="knowledge">
            <div class="canvas-header">
              <div>
                <p class="panel-kicker">Knowledge</p>
                <h2>可复用知识索引</h2>
              </div>
              <button
                class="section-collapse-toggle"
                type="button"
                data-workbench-toggle="knowledge"
                aria-controls="knowledge-grid"
                aria-expanded="true"
                aria-label="收起 Knowledge"
                title="收起 Knowledge"
              ></button>
            </div>
            <div class="knowledge-grid" id="knowledge-grid"></div>
          </section>
        </div>
      </section>

      <section class="markdown-editor" id="markdown-editor" hidden aria-label="Markdown 编辑器">
        <div class="markdown-editor-panel glass">
          <div class="markdown-editor-header">
            <div>
              <p class="panel-kicker">Web 内编辑</p>
              <h2 id="markdown-editor-title"></h2>
              <span id="markdown-editor-path"></span>
            </div>
            <button class="editor-close" id="markdown-editor-close" type="button" aria-label="关闭编辑器">×</button>
          </div>
          <textarea id="markdown-editor-textarea" spellcheck="false"></textarea>
          <div class="editor-actions">
            <p class="markdown-editor-status" id="markdown-editor-status" role="status" aria-live="polite"></p>
            <button class="soft-action" id="markdown-editor-save" type="button">保存到服务器</button>
          </div>
        </div>
      </section>

      <footer class="app-footer" id="app-footer" aria-label="Polaris 版本号" hidden>
        <span id="app-version"></span>
      </footer>
    </main>

    <script type="module" src="/demo/app.js"></script>
  </body>
</html>
